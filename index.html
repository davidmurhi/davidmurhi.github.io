<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David Murhi — Developer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: #0a0a0a;
            color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .title {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        p {
            color: #aaa;
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .projects h2 {
            font-size: 1rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .empty {
            color: #444;
            font-style: italic;
        }

        .links {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .links a {
            color: #f0f0f0;
            text-decoration: none;
            border-bottom: 1px solid #333;
            padding-bottom: 2px;
        }

        .links a:hover {
            border-color: #f0f0f0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>David Murhi</h1>
        <p class="title">Full-stack developer in training — Brisbane, QLD</p>
        <p>Started my coding journey on 21 April 2025.
            Building real projects with Python, JavaScript, and SQL.
            This portfolio grows with every week.</p>
        <div class="projects">
            <h2>Projects</h2>
            <p class="empty">First project coming soon — Week 1 underway.</p>
        </div>
        <div class="links">
            <a href="https://github.com/davidmurhi" target="_blank">GitHub</a>
        </div>
    </div>
</body>

</html>
